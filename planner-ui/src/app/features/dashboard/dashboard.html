<div style="padding: 20px; background-color: #1E1E1E; min-height: 100vh; color: #E0E0E0; display: flex; flex-direction: column;">

  <!-- TOP BAR -->
  <div class="no-print" style="display: flex; justify-content: space-between; background: #252525; padding: 15px 25px; border-radius: 8px; margin-bottom: 25px; align-items: center; border-bottom: 2px solid #99FFCC; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <span style="font-weight: bold; font-size: 1.4em; color: #FFFFFF;"><span style="color: #99FFCC;">🚀 Smart</span> Resource Planner</span>
    <div style="display: flex; align-items: center; gap: 20px;">
      <span style="color: #A0A0A0; font-size: 0.95em;">Zalogowany: <strong style="color: #FFFFFF;">{{ authService.getUsername() }}</strong></span>
      <button (click)="logout()" style="background: #FF6B6B; color: #121212; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8em;">Wyloguj</button>
    </div>
  </div>

  <!-- NAVIGATION TABS -->
  <div class="no-print" style="margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button *ngIf="authService.isAdmin() || authService.getUserRole().includes('EMPLOYEE')" 
            (click)="switchTab('applications')" 
            [style.background]="activeTab === 'applications' ? '#2D4F4F' : '#252525'" 
            [style.color]="activeTab === 'applications' ? '#99FFCC' : '#888'"
            [style.border]="activeTab === 'applications' ? '1px solid #99FFCC' : '1px solid #333'"
            style="padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; position: relative;">
      📋 WNIOSKI
      <span *ngIf="pendingCount > 0" style="position: absolute; top: -6px; right: -6px; background: #FF6B6B; color: #121212; font-size: 0.7em; padding: 2px 6px; border-radius: 10px; font-weight: 900;">{{ pendingCount }}</span>
    </button>
    
    <button *ngIf="authService.isAdmin()" (click)="switchTab('employees')" 
            [style.background]="activeTab === 'employees' ? '#2D4F4F' : '#252525'" 
            [style.color]="activeTab === 'employees' ? '#99FFCC' : '#888'"
            [style.border]="activeTab === 'employees' ? '1px solid #99FFCC' : '1px solid #333'"
            style="padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">
      📊 STATYSTYKI (BI)
    </button>

    <button *ngIf="authService.isAdmin()" (click)="switchTab('admin-users')" 
            [style.background]="activeTab === 'admin-users' ? '#2D4F4F' : '#252525'" 
            [style.color]="activeTab === 'admin-users' ? '#99FFCC' : '#888'"
            [style.border]="activeTab === 'admin-users' ? '1px solid #99FFCC' : '1px solid #333'"
            style="padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: auto;">
      🛡️ ZARZĄDZANIE KONTAMI
    </button>

    <button *ngIf="authService.isAdmin()" (click)="switchTab('admin-resources')" 
            [style.background]="activeTab === 'admin-resources' ? '#2D4F4F' : '#252525'" 
            [style.color]="activeTab === 'admin-resources' ? '#99FFCC' : '#888'"
            [style.border]="activeTab === 'admin-resources' ? '1px solid #99FFCC' : '1px solid #333'"
            style="padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">
      📦 MAGAZYN ZASOBÓW
    </button>
  </div>

  <!-- ZAWARTOŚĆ ZAKŁADEK -->
  <app-applications-tab *ngIf="activeTab === 'applications'" (toast)="showToast($event.message, $event.type)" (pendingCountChange)="updatePendingCount($event)"></app-applications-tab>
  <app-bi-stats-tab *ngIf="activeTab === 'employees'" (showError)="showToast($event, 'error')"></app-bi-stats-tab>
  <app-users-tab *ngIf="activeTab === 'admin-users'" (toast)="showToast($event.message, $event.type)"></app-users-tab>
  <app-resources-tab *ngIf="activeTab === 'admin-resources'" (toast)="showToast($event.message, $event.type)"></app-resources-tab>

  <!-- TOAST NOTIFICATIONS -->
  <div class="no-print" *ngIf="toastMessage" [style.background]="toastType === 'success' ? '#99FFCC' : '#FF6B6B'" style="position: fixed; bottom: 30px; right: 30px; color: #121212; padding: 18px 35px; border-radius: 8px; font-weight: bold; z-index: 99999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(0); transition: all 0.3s ease-out;">
    {{ toastType === 'success' ? '✅' : '❌' }} {{ toastMessage }}
  </div>

</div>
