# Nazwa aplikacji
spring.application.name=smart-resource-planner

# BAZA DANYCH H2 (Dzia?a w pami?ci, NIE WYMAGA DOCKERA)
spring.datasource.url=jdbc:h2:mem:planner_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Konsola H2 (dost?pna pod http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Hibernate - automatyczne tworzenie tabel
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Wy??czamy Flyway na chwil?, bo H2 samo zbuduje tabele z encji
spring.flyway.enabled=false

# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN,USER

# Camunda
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin123
camunda.bpm.filter.create=All Tasks
camunda.bpm.default-serialization-format=application/json

