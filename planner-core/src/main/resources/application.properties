# Nazwa aplikacji
spring.application.name=smart-resource-planner

# Po??czenie z PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/planner_db
spring.datasource.username=postgres
spring.datasource.password=planner123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Camunda Configuration
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.filter.create=All Tasks

camunda.bpm.default-serialization-format=application/json